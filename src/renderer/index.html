<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AI Live2D</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: transparent;
                overflow: hidden;
                user-select: none;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            }

            #app {
                width: 300px;
                height: 570px;
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            /* 气泡区域：专门留出的顶部空间 */
            #bubble-area {
                width: 100%;
                height: 120px;
                position: relative;
                flex-shrink: 0;
            }

            /* 气泡：固定在专用区域内，不遮挡模型 */
            #bubble {
                position: absolute;
                bottom: 8px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(255, 255, 255, 0.95);
                border-radius: 16px;
                padding: 10px 16px;
                width: 240px;
                max-height: 105px;
                min-width: 60px;
                font-size: 13px;
                color: #333;
                z-index: 100;
                line-height: 1.6;
                text-align: center;
                word-break: break-word;
                pointer-events: auto;
                overflow-y: auto;
                box-sizing: border-box;
                opacity: 0;
                visibility: hidden;
                transition: opacity 0.2s ease, visibility 0.2s ease;
            }

            #bubble.show {
                opacity: 1;
                visibility: visible;
                /* box-shadow: 0 4px 16px rgba(0,0,0,0.13); */
            }

            /* 光标指示"可拖拽" */
            #canvas-container {
                width: 300px;
                height: 300px;
                position: relative;
                cursor: grab;
                flex-shrink: 0;
                overflow: visible;
            }

            #canvas-container:active {
                cursor: grabbing;
            }

            #live2d-canvas {
                width: 300px;
                height: 300px;
                outline: none;
                border: none;
            }

            /* 聊天区，默认隐藏，点击模型后显示 */
            #chat-area {
                width: 100%;
                padding: 0 10px 10px;
                display: none;
                gap: 6px;
                flex-shrink: 0;
            }

            #chat-area.visible {
                display: flex;
            }

            #chat-input {
                flex: 1;
                height: 36px;
                border-radius: 18px;
                border: 1.5px solid rgba(180, 180, 220, 0.6);
                background: rgba(255, 255, 255, 0.88);
                backdrop-filter: blur(8px);
                padding: 0 14px;
                font-size: 13px;
                outline: none;
                color: #333;
            }

            #chat-input:focus {
                border-color: rgba(120, 120, 220, 0.8);
            }

            #send-btn {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                border: none;
                background: linear-gradient(135deg, #a78bfa, #818cf8);
                color: white;
                font-size: 16px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                /* box-shadow: 0 2px 8px rgba(129,140,248,0.4); */
                transition: transform 0.1s;
                flex-shrink: 0;
            }

            #send-btn:hover {
                transform: scale(1.05);
            }
            #send-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                transform: none;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <div id="bubble-area">
                <div id="bubble"></div>
            </div>
            <div id="canvas-container">
                <canvas id="live2d-canvas"></canvas>
            </div>

            <div id="chat-area">
                <input id="chat-input" type="text" placeholder="和我说说话吧~" maxlength="200" />
                <button id="send-btn">➤</button>
            </div>
        </div>

        <script src="./live2dcubismcore.min.js"></script>
        <script src="../../node_modules/pixi.js/dist/browser/pixi.min.js"></script>
        <script src="../../node_modules/pixi-live2d-display/dist/cubism4.min.js"></script>
        <script>
            window.PIXI = PIXI;
        </script>
        <script src="./main.js"></script>
    </body>
</html>
